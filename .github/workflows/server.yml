name: 🖥️ MyServer — Linux Web Shell

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Ngrok Auth Token (get at dashboard.ngrok.com)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🛠️ Install useful tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget git vim nano htop \
            python3 python3-pip nodejs npm \
            ffmpeg imagemagick \
            zip unzip tar \
            netcat-openbsd nmap \
            jq build-essential

      - name: 🌐 Install & Setup Ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y ngrok
          ngrok config add-authtoken ${{ github.event.inputs.ngrok_token }}

      - name: 🚀 Start Server + Ngrok + Push URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # Start web server
          python server.py > /tmp/server.log 2>&1 &
          echo "Server PID: $!"
          sleep 3

          # Start ngrok tunnel
          ngrok http 8080 --log=stdout > /tmp/ngrok.log 2>&1 &
          echo "Ngrok PID: $!"
          sleep 10

          # Get public URL from ngrok API
          PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              for t in data.get('tunnels', []):
                  if t.get('proto') == 'https':
                      print(t['public_url'])
                      break
          except Exception as e:
              print('ERROR: ' + str(e), file=sys.stderr)
          ")

          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ Could not get ngrok URL!"
            echo "Ngrok log:"
            cat /tmp/ngrok.log
            echo "Server log:"
            cat /tmp/server.log
            exit 1
          fi

          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║         🖥️  MyServer is LIVE!               ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  🔗 URL: $PUBLIC_URL"
          echo "╚══════════════════════════════════════════════╝"
          echo ""

          # Push URL to repo so it's accessible via API
          git config user.email "myserver-bot@users.noreply.github.com"
          git config user.name "MyServer Bot"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPO}.git

          echo "$PUBLIC_URL" > SERVER_URL.txt
          echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> SERVER_URL.txt

          git add SERVER_URL.txt
          git commit -m "🔗 Live URL: $PUBLIC_URL"
          git push origin HEAD:main

          echo "✅ URL saved to repo!"

          # Keep alive for 6 hours
          echo "⏳ Keeping server alive..."
          sleep 21500

          # Cleanup
          echo "" > SERVER_URL.txt
          echo "offline" >> SERVER_URL.txt
          git add SERVER_URL.txt
          git commit -m "🔴 Server offline"
          git push origin HEAD:main || true
