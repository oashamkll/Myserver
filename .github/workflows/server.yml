name: 🖥️ MyServer — Linux Web Shell

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Ngrok Auth Token (get at dashboard.ngrok.com)'
        required: true
        type: string

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🛠️ Install useful tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget git vim nano htop \
            python3 python3-pip nodejs npm \
            ffmpeg imagemagick \
            zip unzip tar \
            netcat-openbsd nmap \
            jq build-essential

      - name: 🌐 Install & Setup Ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y ngrok
          ngrok config add-authtoken ${{ github.event.inputs.ngrok_token }}

      - name: 🚀 Start Server & Push URL to Repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Start web server
          python server.py &
          sleep 3

          # Start ngrok
          ngrok http 8080 --log=stdout &
          sleep 8

          # Get public URL
          PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              for t in data.get('tunnels', []):
                  if t.get('proto') == 'https':
                      print(t['public_url'])
                      break
          except: pass
          ")

          echo "🔗 PUBLIC URL: $PUBLIC_URL"

          # Push URL to repo file so we can read it via API
          git config user.email "myserver@github.com"
          git config user.name "MyServer Bot"

          echo "$PUBLIC_URL" > SERVER_URL.txt
          echo "Started at: $(date)" >> SERVER_URL.txt

          git add SERVER_URL.txt
          git commit -m "🔗 Server URL: $PUBLIC_URL"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:main

          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║        🖥️  MyServer is LIVE!             ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  🔗 URL: $PUBLIC_URL"
          echo "╚══════════════════════════════════════════╝"

          # Write to summary
          echo "## 🖥️ MyServer is LIVE!" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 [$PUBLIC_URL]($PUBLIC_URL)" >> $GITHUB_STEP_SUMMARY

      - name: ⏳ Keep Alive (up to 6h)
        run: |
          echo "✅ Server is running! Keeping alive for up to 6 hours..."
          sleep 21600
