name: 🖥️ MyServer — Linux Web Shell

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Ngrok Auth Token'
        required: true
        type: string

permissions:
  contents: write

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install aiohttp

      - name: 🔓 Give runner full sudo (passwordless root)
        run: |
          echo "runner ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/runner
          # Make runner able to use sudo without password for everything
          sudo chmod 0440 /etc/sudoers.d/runner

      - name: 🛠️ Pre-install common tools as root
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget git vim nano htop net-tools \
            python3 python3-pip python3-venv \
            nodejs npm \
            ffmpeg \
            zip unzip tar gzip \
            nmap netcat-openbsd \
            jq bc \
            build-essential gcc g++ make \
            sqlite3 \
            screen tmux \
            lsof tree

      - name: 🌐 Install Ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y ngrok
          ngrok config add-authtoken ${{ github.event.inputs.ngrok_token }}

      - name: 🚀 Start Server + Ngrok + Push URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # Copy server to /root and run it from there
          sudo cp server.py /root/server.py
          sudo pip install aiohttp -q

          # Run server as ROOT so all commands inside shell run as root
          sudo bash -c 'cd /root && python3 /root/server.py > /tmp/server.log 2>&1' &
          sleep 4

          # Start ngrok
          ngrok http 8080 --log=stdout > /tmp/ngrok.log 2>&1 &
          sleep 10

          # Get URL
          PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              for t in data.get('tunnels', []):
                  if t.get('proto') == 'https':
                      print(t['public_url'])
                      break
          except: pass
          ")

          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ No ngrok URL!"
            cat /tmp/ngrok.log
            cat /tmp/server.log
            exit 1
          fi

          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║       🖥️  MyServer is LIVE!              ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  🔗 $PUBLIC_URL"
          echo "╚══════════════════════════════════════════╝"

          # Save URL to repo
          git config user.email "bot@myserver.dev"
          git config user.name "MyServer Bot"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPO}.git
          echo "$PUBLIC_URL" > SERVER_URL.txt
          echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> SERVER_URL.txt
          git add SERVER_URL.txt
          git commit -m "🔗 Live: $PUBLIC_URL"
          git push origin HEAD:main

          # Keep alive
          sleep 21500
