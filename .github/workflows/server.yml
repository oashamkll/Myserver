name: 🖥️ Termux Server — Persistent

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Ngrok Auth Token'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔓 Full sudo
        run: |
          echo "runner ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/runner
          sudo chmod 0440 /etc/sudoers.d/runner

      - name: 🛠️ Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget git vim nano htop net-tools \
            python3 python3-pip python3-venv \
            nodejs npm \
            ffmpeg \
            zip unzip tar gzip \
            nmap netcat-openbsd \
            jq bc \
            build-essential gcc g++ make \
            sqlite3 screen tmux lsof tree \
            rclone rsync

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python deps
        run: sudo pip install aiohttp -q

      - name: 🌐 Install Ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y ngrok
          ngrok config add-authtoken ${{ github.event.inputs.ngrok_token }}

      - name: 💾 Restore saved state from repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          sudo mkdir -p /root/workspace /root/uploads /tmp/.state

          # Check if saved state archive exists in repo
          STATE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPO}/contents/state/workspace.tar.gz.b64")

          if [ "$STATE_EXISTS" = "200" ]; then
            echo "[*] Found saved state — restoring..."

            # Download and decode
            curl -s \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${GITHUB_REPO}/contents/state/workspace.tar.gz.b64" \
              -o /tmp/workspace.tar.gz.b64

            base64 -d /tmp/workspace.tar.gz.b64 > /tmp/workspace.tar.gz
            sudo tar -xzf /tmp/workspace.tar.gz -C / 2>/dev/null || true

            echo "[✅] State restored!"
          else
            echo "[*] No saved state found — fresh start"
          fi

          # Restore pip packages list if exists
          PKG_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPO}/contents/state/pip_packages.txt")

          if [ "$PKG_EXISTS" = "200" ]; then
            echo "[*] Restoring pip packages..."
            curl -s \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${GITHUB_REPO}/contents/state/pip_packages.txt" \
              -o /tmp/pip_packages.txt
            sudo pip install -r /tmp/pip_packages.txt -q 2>/dev/null || true
            echo "[✅] Pip packages restored!"
          fi

          # Restore apt packages list if exists
          APT_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPO}/contents/state/apt_packages.txt")

          if [ "$APT_EXISTS" = "200" ]; then
            echo "[*] Restoring apt packages..."
            curl -s \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${GITHUB_REPO}/contents/state/apt_packages.txt" \
              -o /tmp/apt_packages.txt
            sudo apt-get install -y -qq $(cat /tmp/apt_packages.txt | tr '\n' ' ') 2>/dev/null || true
            echo "[✅] Apt packages restored!"
          fi

      - name: 🚀 Start Server + Ngrok + Persistence Loop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          NGROK_TOKEN: ${{ github.event.inputs.ngrok_token }}
          WORKFLOW_ID: "server.yml"
        run: |
          sudo cp server.py /root/server.py
          sudo mkdir -p /root/workspace /root/uploads

          # ── Write the save-state helper script ──
          sudo tee /usr/local/bin/save-state > /dev/null << 'SAVESCRIPT'
          #!/bin/bash
          # Called periodically and before restart to persist files
          GH_TOKEN="$1"
          GITHUB_REPO="$2"

          echo "[*] Saving state..."

          # Save workspace files (max 90MB to fit GitHub file limit)
          tar -czf /tmp/workspace.tar.gz \
            /root/workspace /root/uploads /root/.bashrc /root/.bash_history \
            --exclude='*.pyc' --exclude='__pycache__' \
            --exclude='/root/workspace/node_modules' \
            2>/dev/null || true

          SIZE=$(stat -c%s /tmp/workspace.tar.gz 2>/dev/null || echo 0)
          if [ "$SIZE" -lt "94000000" ]; then
            B64=$(base64 -w 0 /tmp/workspace.tar.gz)

            # Get current SHA if exists
            SHA=$(curl -s \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPO}/contents/state/workspace.tar.gz.b64" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")

            if [ -z "$SHA" ]; then
              # Create new
              curl -s -X PUT \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"message\":\"💾 Save state\",\"content\":\"${B64}\"}" \
                "https://api.github.com/repos/${GITHUB_REPO}/contents/state/workspace.tar.gz.b64" > /dev/null
            else
              # Update existing
              curl -s -X PUT \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"message\":\"💾 Save state\",\"content\":\"${B64}\",\"sha\":\"${SHA}\"}" \
                "https://api.github.com/repos/${GITHUB_REPO}/contents/state/workspace.tar.gz.b64" > /dev/null
            fi
            echo "[✅] Workspace saved ($(( SIZE / 1024 ))KB)"
          else
            echo "[!] Workspace too large to save (${SIZE} bytes)"
          fi

          # Save pip packages
          pip freeze 2>/dev/null | grep -v "^#" > /tmp/pip_packages.txt || true
          PIP_B64=$(base64 -w 0 /tmp/pip_packages.txt)
          PIP_SHA=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPO}/contents/state/pip_packages.txt" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
          if [ -z "$PIP_SHA" ]; then
            curl -s -X PUT \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"💾 Save pip packages\",\"content\":\"${PIP_B64}\"}" \
              "https://api.github.com/repos/${GITHUB_REPO}/contents/state/pip_packages.txt" > /dev/null
          else
            curl -s -X PUT \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"💾 Save pip packages\",\"content\":\"${PIP_B64}\",\"sha\":\"${PIP_SHA}\"}" \
              "https://api.github.com/repos/${GITHUB_REPO}/contents/state/pip_packages.txt" > /dev/null
          fi

          # Save apt packages (manually installed)
          apt-mark showmanual 2>/dev/null > /tmp/apt_packages.txt || true
          APT_B64=$(base64 -w 0 /tmp/apt_packages.txt)
          APT_SHA=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPO}/contents/state/apt_packages.txt" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
          if [ -z "$APT_SHA" ]; then
            curl -s -X PUT \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"💾 Save apt packages\",\"content\":\"${APT_B64}\"}" \
              "https://api.github.com/repos/${GITHUB_REPO}/contents/state/apt_packages.txt" > /dev/null
          else
            curl -s -X PUT \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"💾 Save apt packages\",\"content\":\"${APT_B64}\",\"sha\":\"${APT_SHA}\"}" \
              "https://api.github.com/repos/${GITHUB_REPO}/contents/state/apt_packages.txt" > /dev/null
          fi

          echo "[✅] State saved!"
          SAVESCRIPT
          sudo chmod +x /usr/local/bin/save-state

          # ── Write autorun manager ──
          sudo tee /usr/local/bin/autorun > /dev/null << 'AUTORUN'
          #!/bin/bash
          # Usage: autorun add "python3 /root/workspace/bot.py"
          #        autorun list
          #        autorun remove 1
          #        autorun run   (runs all)
          LISTFILE="/tmp/.autorun_list"
          touch "$LISTFILE"
          case "$1" in
            add)
              echo "$2" >> "$LISTFILE"
              echo "[+] Added: $2"
              # Start it now too
              nohup bash -c "$2" > "/tmp/autorun_$(echo $2 | md5sum | cut -c1-6).log" 2>&1 &
              echo "[+] Started PID $!"
              ;;
            list)
              echo "=== Autorun list ==="
              cat -n "$LISTFILE"
              ;;
            remove)
              sed -i "${2}d" "$LISTFILE"
              echo "[+] Removed line $2"
              ;;
            run)
              echo "[*] Running all autorun scripts..."
              while IFS= read -r cmd; do
                [ -z "$cmd" ] && continue
                nohup bash -c "$cmd" > "/tmp/autorun_$(echo $cmd | md5sum | cut -c1-6).log" 2>&1 &
                echo "[+] Started: $cmd (PID $!)"
              done < "$LISTFILE"
              ;;
          esac
          AUTORUN
          sudo chmod +x /usr/local/bin/autorun

          # ── Start autorun processes ──
          autorun run 2>/dev/null || true

          # ── Start server ──
          sudo bash -c 'cd /root && python3 /root/server.py > /tmp/server.log 2>&1' &
          sleep 4

          # ── Start ngrok ──
          ngrok http 8080 --log=stdout > /tmp/ngrok.log 2>&1 &
          sleep 10

          PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              for t in data.get('tunnels', []):
                  if t.get('proto') == 'https':
                      print(t['public_url'])
                      break
          except: pass
          ")

          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ No ngrok URL!"
            cat /tmp/ngrok.log
            cat /tmp/server.log
            exit 1
          fi

          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║      🖥️  Termux Server LIVE!         ║"
          echo "╠══════════════════════════════════════╣"
          echo "║  🔗 $PUBLIC_URL"
          echo "╚══════════════════════════════════════╝"

          # Push URL
          git config user.email "bot@myserver.dev"
          git config user.name "MyServer Bot"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPO}.git
          git pull origin main --rebase 2>/dev/null || true
          echo "$PUBLIC_URL" > SERVER_URL.txt
          echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> SERVER_URL.txt
          git add SERVER_URL.txt
          git commit -m "🔗 Live: $PUBLIC_URL" || true
          git push origin HEAD:main || true

          # ── MAIN LOOP: save state every 10 min, restart at 5h 30min ──
          ELAPSED=0
          MAX=19800   # 5h 30min in seconds
          SAVE_INTERVAL=600  # save every 10 min

          echo "[*] Main loop started. Auto-save every 10min. Restart at 5h30min."

          while [ $ELAPSED -lt $MAX ]; do
            sleep $SAVE_INTERVAL
            ELAPSED=$(( ELAPSED + SAVE_INTERVAL ))
            MINS=$(( ELAPSED / 60 ))
            echo "[*] ${MINS}min elapsed — saving state..."
            save-state "${GH_TOKEN}" "${GITHUB_REPO}"
          done

          # ── Final save before restart ──
          echo "[*] Saving state before restart..."
          save-state "${GH_TOKEN}" "${GITHUB_REPO}"

          # ── Trigger next run ──
          echo "[*] Triggering auto-restart..."
          curl -s -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"main\",\"inputs\":{\"ngrok_token\":\"${NGROK_TOKEN}\"}}" \
            "https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches"

          echo "[✅] New run triggered! Keeping alive 5 min for handover..."
          sleep 300
