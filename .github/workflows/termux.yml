name: Termux Server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Ngrok token (optional, uses secret if empty)'
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve ngrok token
        run: |
          # Prefer manually passed token, fallback to secret
          TOKEN="${{ github.event.inputs.ngrok_token }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${{ secrets.NGROK_TOKEN }}"
          fi
          if [ -z "$TOKEN" ]; then
            echo "ERROR: No ngrok token found"; exit 1
          fi
          echo "NGROK_TOKEN=${TOKEN}" >> $GITHUB_ENV

      - name: Full sudo
        run: |
          echo "runner ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/runner
          sudo chmod 0440 /etc/sudoers.d/runner

      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget git vim nano htop net-tools \
            python3 python3-pip python3-venv nodejs npm ffmpeg \
            zip unzip tar gzip nmap netcat-openbsd jq bc \
            build-essential gcc g++ make sqlite3 screen tmux lsof tree rsync

      - name: Install Python deps
        run: sudo pip install -r requirements.txt --break-system-packages -q

      - name: Install ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y ngrok
          ngrok config add-authtoken "${{ env.NGROK_TOKEN }}"

      - name: Restore state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: bash scripts/restore-state.sh

      - name: Run server
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          WORKFLOW_ID: termux.yml
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: bash scripts/run-server.sh
