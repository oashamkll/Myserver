name: Termux Server

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Ngrok Auth Token'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: ЁЯУе Checkout
        uses: actions/checkout@v4

      - name: ЁЯФУ Full sudo
        run: |
          echo "runner ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/runner
          sudo chmod 0440 /etc/sudoers.d/runner

      - name: ЁЯЫая╕П Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget git vim nano htop net-tools \
            python3 python3-pip python3-venv nodejs npm ffmpeg \
            zip unzip tar gzip nmap netcat-openbsd jq bc \
            build-essential gcc g++ make sqlite3 screen tmux lsof tree rsync

      - name: ЁЯУж Python deps
        run: sudo pip install aiohttp -q

      - name: ЁЯМР Ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y ngrok
          ngrok config add-authtoken ${{ github.event.inputs.ngrok_token }}

      - name: ЁЯТ╛ Restore state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          sudo mkdir -p /root/workspace /root/uploads
          for FILE in workspace.tar.gz.b64 pip_packages.txt apt_packages.txt; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPO}/contents/state/${FILE}")
            if [ "$HTTP" = "200" ]; then
              echo "[*] Restoring $FILE..."
              curl -s -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/vnd.github.v3.raw" \
                "https://api.github.com/repos/${GITHUB_REPO}/contents/state/${FILE}" \
                -o /tmp/${FILE}
              if [[ "$FILE" == *.tar.gz.b64 ]]; then
                base64 -d /tmp/${FILE} | sudo tar -xzf - -C / 2>/dev/null || true
              elif [[ "$FILE" == pip_packages.txt ]]; then
                sudo pip install -r /tmp/${FILE} -q 2>/dev/null || true
              elif [[ "$FILE" == apt_packages.txt ]]; then
                xargs -a /tmp/${FILE} sudo apt-get install -y -qq 2>/dev/null || true
              fi
              echo "[тЬЕ] $FILE restored"
            fi
          done

      - name: ЁЯЪА Run server
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          NGROK_TOKEN: ${{ github.event.inputs.ngrok_token }}
          WORKFLOW_ID: "termux.yml"
        run: |
          sudo cp server.py /root/server.py
          sudo mkdir -p /root/workspace /root/uploads

          # save-state script
          sudo tee /usr/local/bin/save-state > /dev/null << 'EOF'
#!/bin/bash
GH_TOKEN="$1"; GITHUB_REPO="$2"
[ -z "$GH_TOKEN" ] && exit 1
echo "[*] Saving..."
tar -czf /tmp/ws.tar.gz /root/workspace /root/uploads /root/.bashrc /root/.bash_history \
  --exclude='*.pyc' --exclude='__pycache__' --exclude='node_modules' 2>/dev/null || true
SZ=$(stat -c%s /tmp/ws.tar.gz 2>/dev/null || echo 99999999)
if [ "$SZ" -lt "94000000" ]; then
  B64=$(base64 -w 0 /tmp/ws.tar.gz)
  SHA=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
    "https://api.github.com/repos/${GITHUB_REPO}/contents/state/workspace.tar.gz.b64" \
    | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('sha',''))" 2>/dev/null)
  BODY="{\"message\":\"save\",\"content\":\"${B64}\"}"
  [ -n "$SHA" ] && BODY="{\"message\":\"save\",\"content\":\"${B64}\",\"sha\":\"${SHA}\"}"
  curl -s -X PUT -H "Authorization: token ${GH_TOKEN}" -H "Content-Type: application/json" \
    -d "$BODY" "https://api.github.com/repos/${GITHUB_REPO}/contents/state/workspace.tar.gz.b64" > /dev/null
fi
pip freeze 2>/dev/null > /tmp/pip.txt
PB64=$(base64 -w 0 /tmp/pip.txt)
PSHA=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
  "https://api.github.com/repos/${GITHUB_REPO}/contents/state/pip_packages.txt" \
  | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('sha',''))" 2>/dev/null)
PBODY="{\"message\":\"save pip\",\"content\":\"${PB64}\"}"
[ -n "$PSHA" ] && PBODY="{\"message\":\"save pip\",\"content\":\"${PB64}\",\"sha\":\"${PSHA}\"}"
curl -s -X PUT -H "Authorization: token ${GH_TOKEN}" -H "Content-Type: application/json" \
  -d "$PBODY" "https://api.github.com/repos/${GITHUB_REPO}/contents/state/pip_packages.txt" > /dev/null
apt-mark showmanual 2>/dev/null > /tmp/apt.txt
AB64=$(base64 -w 0 /tmp/apt.txt)
ASHA=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
  "https://api.github.com/repos/${GITHUB_REPO}/contents/state/apt_packages.txt" \
  | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('sha',''))" 2>/dev/null)
ABODY="{\"message\":\"save apt\",\"content\":\"${AB64}\"}"
[ -n "$ASHA" ] && ABODY="{\"message\":\"save apt\",\"content\":\"${AB64}\",\"sha\":\"${ASHA}\"}"
curl -s -X PUT -H "Authorization: token ${GH_TOKEN}" -H "Content-Type: application/json" \
  -d "$ABODY" "https://api.github.com/repos/${GITHUB_REPO}/contents/state/apt_packages.txt" > /dev/null
echo "[тЬЕ] State saved!"
EOF
          sudo chmod +x /usr/local/bin/save-state

          # autorun in screen
          sudo tee /usr/local/bin/autorun > /dev/null << 'EOF'
#!/bin/bash
LIST="/tmp/.autorun_list"
touch "$LIST"
case "$1" in
  add)
    echo "$2" >> "$LIST"
    IDX=$(wc -l < "$LIST")
    screen -dmS "ar_${IDX}" bash -c "$2"
    echo "[+] Started in screen ar_${IDX}: $2"
    ;;
  list)
    echo "=== Autorun ==="
    i=1; while IFS= read -r cmd; do
      [ -z "$cmd" ] && { i=$((i+1)); continue; }
      RUN=$(screen -ls 2>/dev/null | grep -c "ar_${i}")
      ST=$( [ "$RUN" -gt 0 ] && echo "ЁЯЯв" || echo "ЁЯФ┤")
      echo "  [$i] $ST $cmd"
      i=$((i+1))
    done < "$LIST"
    ;;
  remove)
    sed -i "${2}d" "$LIST"
    echo "[+] Removed $2"
    ;;
  run)
    i=1; while IFS= read -r cmd; do
      [ -z "$cmd" ] && { i=$((i+1)); continue; }
      screen -dmS "ar_${i}" bash -c "$cmd"
      echo "[+] Started ar_${i}: $cmd"
      i=$((i+1))
    done < "$LIST"
    ;;
  stop)
    screen -S "$2" -X quit && echo "[+] Stopped $2"
    ;;
esac
EOF
          sudo chmod +x /usr/local/bin/autorun

          # Start autorun processes
          autorun run 2>/dev/null || true

          # Start server in screen (survives browser close)
          sudo screen -dmS termux-server bash -c \
            'cd /root && python3 /root/server.py > /tmp/server.log 2>&1'
          sleep 5

          if ! curl -s http://localhost:8080 > /dev/null; then
            echo "тЭМ Server failed!"
            cat /tmp/server.log
            exit 1
          fi

          # Start ngrok in screen
          screen -dmS termux-ngrok bash -c \
            'ngrok http 8080 --log=stdout > /tmp/ngrok.log 2>&1'
          sleep 12

          PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    for t in d.get('tunnels',[]):
        if t.get('proto')=='https': print(t['public_url']); break
except: pass
")
          [ -z "$PUBLIC_URL" ] && { echo "тЭМ No URL!"; cat /tmp/ngrok.log; exit 1; }

          echo ""; echo "тХФтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХЧ"
          echo "тХС   ЁЯЦея╕П  Termux Server LIVE!        тХС"
          echo "тХатХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХг"
          echo "тХС  ЁЯФЧ $PUBLIC_URL"; echo "тХЪтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХЭ"
          screen -ls || true

          git config user.email "bot@myserver.dev"
          git config user.name "MyServer Bot"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPO}.git
          git pull origin main --rebase 2>/dev/null || true
          echo "$PUBLIC_URL" > SERVER_URL.txt
          echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> SERVER_URL.txt
          git add SERVER_URL.txt && git commit -m "ЁЯФЧ Live: $PUBLIC_URL" || true
          git push origin HEAD:main || true

          ELAPSED=0; MAX=19800; INTERVAL=600
          echo "[*] Loop: save every 10min, restart at 5h30m"
          while [ $ELAPSED -lt $MAX ]; do
            sleep $INTERVAL
            ELAPSED=$(( ELAPSED + INTERVAL ))
            echo "[$(date -u '+%H:%M')] Saving state..."
            save-state "${GH_TOKEN}" "${GITHUB_REPO}"
            # Health check ngrok
            if ! curl -s http://localhost:4040/api/tunnels | python3 -c \
              "import sys,json;d=json.load(sys.stdin);assert d.get('tunnels')" 2>/dev/null; then
              echo "[!] Ngrok dead, restarting..."
              screen -S termux-ngrok -X quit 2>/dev/null; sleep 2
              screen -dmS termux-ngrok bash -c 'ngrok http 8080 > /tmp/ngrok.log 2>&1'
              sleep 12
              NEW_URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    for t in d.get('tunnels',[]):
        if t.get('proto')=='https': print(t['public_url']); break
except: pass")
              if [ -n "$NEW_URL" ]; then
                git pull origin main --rebase 2>/dev/null || true
                echo "$NEW_URL" > SERVER_URL.txt
                echo "Restarted: $(date -u '+%H:%M UTC')" >> SERVER_URL.txt
                git add SERVER_URL.txt && git commit -m "ЁЯФЧ $NEW_URL" || true
                git push origin HEAD:main || true
              fi
            fi
          done

          save-state "${GH_TOKEN}" "${GITHUB_REPO}"
          curl -s -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"main\",\"inputs\":{\"ngrok_token\":\"${NGROK_TOKEN}\"}}" \
            "https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches"
          echo "[тЬЕ] Next run triggered!"
          sleep 300
